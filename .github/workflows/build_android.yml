name: Build Android Standalone APK

on:
  workflow_dispatch: # Permite iniciar manualmente no GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # Alterado de 18 para 20
          cache: 'yarn'

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Dependencies
        run: |
          yarn install

      - name: Prebuild Expo (Gerar pasta nativa do Android)
        run: |
          cd apps/expo
          npx expo prebuild --platform android --no-install

      - name: Generate Temporary Release Keystore
        run: |
          keytool -genkey -v \
            -keystore apps/expo/android/temp-release.keystore \
            -alias temp-alias \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass temp-password \
            -keypass temp-password \
            -dname "CN=Stump, OU=Dev, O=Stump, L=Stump, S=Stump, C=US"

      - name: Build and Sign Android App (Assemble Release APK)
        run: |
          cd apps/expo/android
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=temp-release.keystore \
            -Pandroid.injected.signing.store.password=temp-password \
            -Pandroid.injected.signing.store.key.alias=temp-alias \
            -Pandroid.injected.signing.store.key.password=temp-password

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: stump-android-release-apk
          path: apps/expo/android/app/build/outputs/apk/release/app-release.apk